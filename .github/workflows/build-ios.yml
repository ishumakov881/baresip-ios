name: Build iOS telephony

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain
        run: |
          xcodebuild -version
          cmake --version

      - name: make download
        run: make download

      - name: make contrib
        run: make contrib

      - name: make xcframework
        run: make xcframework

      - name: Verify artifacts
        run: |
          ls -la contrib/ios-arm64/lib contrib/ios-simulator-arm64/lib
          ls -la dist/telephony.xcframework

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: telephony-ios
          path: |
            dist/telephony.xcframework
            dist/headers
            contrib/ios-arm64/lib
            contrib/ios-simulator-arm64/lib
          retention-days: 30
