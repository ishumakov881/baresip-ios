name: Build iOS contrib

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-contrib:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: make download && make contrib
        run: |
          make download
          make contrib
          ls -la contrib/ios-arm64/lib contrib/ios-simulator-arm64/lib

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: baresip-ios-contrib
          path: |
            contrib/ios-arm64/lib
            contrib/ios-simulator-arm64/lib
            contrib/ios-arm64/include
            contrib/ios-simulator-arm64/include
          retention-days: 30
