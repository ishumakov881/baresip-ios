name: Build iOS contrib

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-contrib:
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: make download && make contrib
        run: |
          make download
          make contrib
          ls -la contrib/fat/lib/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: baresip-ios-contrib
          path: contrib/fat/lib/
          retention-days: 30
