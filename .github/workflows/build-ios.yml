name: Build telephony xcframework

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build-xcframework:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: CMake version
        run: cmake --version

      - name: Clone baresip stack
        run: make download

      - name: Build contrib (re + baresip)
        run: make baresip

      - name: List contrib libs
        run: |
          ls -la contrib/ios-arm64/lib || true
          ls -la contrib/ios-simulator-arm64/lib || true

      - name: Verify merged libs (single platform per slice)
        run: |
          lipo -info contrib/ios-arm64/lib/libtelephony_all.a
          lipo -info contrib/ios-simulator-arm64/lib/libtelephony_all.a
          otool -l contrib/ios-arm64/lib/libtelephony_all.a | grep -A2 LC_BUILD_VERSION | head -6
          otool -l contrib/ios-simulator-arm64/lib/libtelephony_all.a | grep -A2 LC_BUILD_VERSION | head -6

      - name: Build xcframework
        run: make xcframework

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: telephony-xcframework
          path: |
            dist/telephony.xcframework
            dist/headers
          retention-days: 30

      - name: Package zip for release
        if: github.event_name == 'release'
        run: |
          cd dist
          zip -r telephony.xcframework.zip telephony.xcframework headers

      - name: Upload release asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/telephony.xcframework.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
