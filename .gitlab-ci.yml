# macOS runner: GitLab Premium / open source program, tag saas-macos-medium-m1
# https://docs.gitlab.com/ci/runners/hosted_runners/macos/

stages:
  - build

build-contrib:
  stage: build
  tags:
    - saas-macos-medium-m1
  image: macos-15-xcode-16
  script:
    - make download
    - make contrib
    - ls -la contrib/ios-arm64/lib contrib/ios-simulator-arm64/lib
  artifacts:
    name: baresip-ios-contrib
    paths:
      - contrib/ios-arm64/lib/
      - contrib/ios-simulator-arm64/lib/
      - contrib/ios-arm64/include/
      - contrib/ios-simulator-arm64/include/
    expire_in: 30 days
